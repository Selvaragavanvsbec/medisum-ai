services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"

  app:
    build: .
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY}
      MONGODB_URI: mongodb://mongo:27017
      MONGODB_DB: medisum
      ALLOWED_ORIGINS: http://localhost:8080
    ports:
      - "8080:8080"

volumes:
  mongo_data:
